<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Simulador Financeiro Arabidopsis thaliana</title>
</head>

<body>
    <div class="container-simulador">
        <div class="container-simulador-titulo">
            <div class="container-simulado-titulo-h1">
                <h1>Simulador Financeiro:
                    <span style="font-style: italic; font-weight: 600;">Arabidopsis thaliana</span>
                </h1>
            </div>
            <div class="container-simulador-logo2">
                <img src="./images/dataLumini.svg" alt="">
            </div>
            <div class="container-simulador-logo">
                <img src="./images/logo.svg" alt="">
            </div>
        </div>

        <div class="content-simulador">
            <div class="content-right-group">
                <div class="content-right-row">
                    <label for="id_horasLigado">Horas por dia de iluminação:</label>
                    <input type="number" id="id_horasLigado" placeholder="Ex: 20">
                </div>
                <div class="content-right-row">
                    <label for="id_kwhGasto">Consumo mensal de KWh:</label>
                    <input type="number" id="id_kwhGasto" placeholder="Ex: 420">
                </div>
                <div class="content-right-row">
                    <label for="id_precoKWh">Preço do KWh (R$):</label>
                    <input type="number" id="id_precoKWh" step="0.01" placeholder="Ex: 0.90">
                </div>
                
                <button onclick="calcularSimulacao()">Calcular Impacto Financeiro</button>
            </div>

            <div id="id_mensagem"></div>
        </div>
    </div>

    <script>
        function calcularSimulacao() {
            let horasLigado = Number(id_horasLigado.value);
            let kwhGastoMensal = Number(id_kwhGasto.value);
            let precoKWh = Number(id_precoKWh.value);
            let mensagemDiv = document.getElementById("id_mensagem");

            if (id_horasLigado.value === "" || id_kwhGasto.value === "" || id_precoKWh.value === "") {
                mensagemDiv.innerHTML = `<span class="destaque-vermelho">Por favor, preencha todos os campos corretamente.</span>`;
                return;
            }

            if (horasLigado < 0 || horasLigado > 24) {
                mensagemDiv.innerHTML = `<span class="destaque-vermelho">Erro: O dia possui apenas 24 horas!</span>`;
                return;
            }

            let totalGastoAnual = kwhGastoMensal * precoKWh * 12;
            let horasRetrabalho = horasLigado * 365;

            if (horasLigado === 0) {
                mensagemDiv.innerHTML = `
                    <p class="destaque-vermelho">🚨 ALERTA CRÍTICO: Iluminação Zero!</p>
                    <p><i>Arabidopsis thaliana</i> <b>necessita de no mínimo 16 horas de luz diárias</b> para realizar fotossíntese e sobreviver.</p>
                    <p>Sem qualquer iluminação, a planta <b>morrerá em poucos dias</b> e sua pesquisa será <b>perdida totalmente</b>, exigindo o reinício completo do experimento do zero.</p>
                    <p><b>Ação imediata necesária:</b> Ativar a iluminação LED para evitar a morte das amostras!</p>
                `;
            } 
            else if (horasLigado < 16) {

                mensagemDiv.innerHTML = `
                    <p>Gasto anual estimado: <span class="destaque-verde">R$ ${totalGastoAnual.toFixed(2)}</span>.</p>
                    <p class="destaque-vermelho">⚠️ Aviso: Iluminação Insuficiente - Risco de Morte!</p>
                    <p><i>Arabidopsis thaliana</i> requer <b>exatamente 16 horas de luz diária</b>. Seu ambiente mantém apenas <b>${horasLigado} horas</b>, deixando a planta com <b>${16 - horasLigado} horas de deficiência</b>.</p>
                    <p>Com este período reduzido de luz, a planta sofrerá <b>estresse biológico severo</b>, desenvolvendo lentamente ou podendo <b>morrer</b>. Você terá que recomeçar a pesquisa do zero.</p>
                    <p><b>Retrabalho estimado:</b> <span class="destaque-vermelho">${horasRetrabalho} horas</span> para reiniciar uma nova pesquisa.</p>
                    <p><b>Recomendação:</b> Aumentar a iluminação para 16 horas diárias para garantir o sucesso do experimento!</p>
                `;
            } 
            else if (horasLigado === 16) {
                mensagemDiv.innerHTML = `
                    <p>Gasto anual: <span class="destaque-verde">R$ ${totalGastoAnual.toFixed(2)}</span>.</p>
                    <p class="destaque-verde">✅ Eficiência Máxima Alcançada!</p>
                    <p>Parabéns! Seu ambiente está fornecendo <b>exatamente 16 horas de luz diárias</b> - o período ideal para o desenvolvimento saudável da <i>Arabidopsis thaliana</i>.</p>
                    <p>A planta receberá toda a luz necessária para realizar fotossíntese adequadamente, crescer normalmente e completar seu ciclo biológico sem estresse.</p>
                    <p>Seu laboratório opera com <b>0% de desperdício energético</b> e <b>0% de risco biológico</b>. Não há risco de morte e nenhum retrabalho será necessário!</p>
                `;
            } 
            else { 
                let horasExtrasAnuais = (horasLigado - 16) * 365;
                let prejuizoFinanceiro = (totalGastoAnual / (horasLigado * 365)) * horasExtrasAnuais;
                let porcentagemDesperdicio = (prejuizoFinanceiro / totalGastoAnual) * 100;

                mensagemDiv.innerHTML = `
                    <p>Gasto anual total: <span class="destaque-verde">R$ ${totalGastoAnual.toFixed(2)}</span>.</p>
                    <p class="destaque-vermelho">💸 Alerta: Desperdício Energético Detectado!</p>
                    <p>Seu ambiente fornece <b>${horasLigado} horas de luz diárias</b>, quando o ideal para <i>Arabidopsis thaliana</i> é apenas <b>16 horas</b>.</p>
                    <p>Você está desperdiçando <b>${horasExtrasAnuais} horas</b> de iluminação por ano, gerando um <b>custo fantasma de R$ ${prejuizoFinanceiro.toFixed(2)}/ano</b>.</p>
                    <p>Este desperdício representa <b>${porcentagemDesperdicio.toFixed(2)}%</b> do seu orçamento total com energia - recursos que poderiam ser usados em outras áreas da pesquisa.</p>
                    <p><b>Atenção Científica:</b> O excesso de luz pode causar <b>floração precoce</b>, <b>estresse oxidativo</b> e alterar o ciclo biológico natural da planta, comprometendo a qualidade científica do experimento.</p>
                    <p><b>Recomendação:</b> Reduzir a iluminação para 16 horas diárias para economizar energia e proteger a saúde das amostras!</p>
                `;
            }
        }
    </script>
</body>
</html>
